name: Regression

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  merge_group:
    types: [checks_requested]

jobs:
  pnpm-setup-v6:
    strategy:
      fail-fast: false
      matrix:
        # v11+ reads PNPM_CONFIG_STORE_DIR; pre-v11 reads NPM_CONFIG_STORE_DIR.
        # Both are exercised so a regression in either path fails this workflow.
        pnpm-version: [10, 11]
    runs-on:
      - nscloud-ubuntu-22.04-amd64-8x16-with-cache
      - nscloud-cache-size-20gb
      - nscloud-cache-tag-spacectl-pnpm-${{ matrix.pnpm-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          cache: go

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install spacectl from HEAD
        run: go build -o dist/spacectl .

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ matrix.pnpm-version }}

      - name: Set up PNPM cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        with:
          cache: pnpm
        env:
          NSC_POWERTOYS_DIR: ./dist/ # force binary location

      - name: Verify pnpm uses the cache volume
        run: |
          store="$(pnpm store path)"
          echo "pnpm store: $store"
          echo "cache root: $NSC_CACHE_PATH"
          case "$store" in
            "$NSC_CACHE_PATH"/*) ;;
            *) echo "expected pnpm store to live under \$NSC_CACHE_PATH" >&2; exit 1 ;;
          esac

      - name: Verify package install hits the cache volume
        run: |
          mkdir -p /tmp/sample && cd /tmp/sample
          echo '{"name":"x","version":"1.0.0","dependencies":{"is-odd":"3.0.1"}}' > package.json
          pnpm install --ignore-scripts
          test -n "$(find "$NSC_CACHE_PATH/pnpm-store" -mindepth 1 -print -quit)"
