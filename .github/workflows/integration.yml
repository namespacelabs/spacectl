name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  merge_group:
    types: [checks_requested]

jobs:
  # Tests the nscloud-cache-action against all cache modes using the current spacectl binary.
  # This ensures changes to spacectl don't break any cache mode integrations.
  cache-modes:
    name: cache modes
    uses: namespacelabs/nscloud-cache-action/.github/workflows/modes-reusable.yaml@15799a6b54e5765f85b2aac25b3f0df43ed571c0
    with:
      spacectl-source-ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Single check for branch protection after all mode tests complete
  cache-modes-ok:
    name: cache mode verification
    needs: cache-modes
    if: always()
    runs-on:
      - nscloud-ubuntu-24.04-amd64-2x4
    steps:
      - name: Check mode tests passed
        run: |
          if [[ "${{ needs.cache-modes.result }}" != "success" ]]; then
            echo "nscloud-cache-action mode tests failed with result: ${{ needs.cache-modes.result }}"
            exit 1
          fi
          echo "All mode tests passed"

  # Builds the spacectl binary and runs binary integration tests
  spacectl-binary:
    name: spacectl binary
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build spacectl
        run: |
          go build -ldflags "\
            -X main.Version=test-v1.2.3 \
            -X main.Commit=${{ github.sha }} \
            -X main.Date=2025-01-01T00:00:00Z" \
            -o dist/spacectl .

      - name: Run integration tests
        env:
          INTEGRATION_SPACECTL_BIN: ${{ github.workspace }}/dist/spacectl
          INTEGRATION_SPACECTL_BIN_VERSION: test-v1.2.3
          INTEGRATION_SPACECTL_BIN_COMMIT: ${{ github.sha }}
          INTEGRATION_SPACECTL_BIN_DATE: "2025-01-01T00:00:00Z"
        run: go test -race -run TestIntegration_ ./...

  # Builds the spacectl binary and performs a real (destructive) cache mount on
  # Windows. Uses a cache-backed runner so NSC_CACHE_PATH points at a real cache
  # volume, exercising the NTFS junction mount path end-to-end.
  spacectl-binary-windows:
    name: spacectl binary (windows)
    runs-on:
      - nscloud-windows-2022-amd64-4x8-with-cache
      - nscloud-cache-size-20gb
      - nscloud-cache-tag-integration-windows
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build spacectl
        shell: bash
        run: |
          go build -ldflags "\
            -X main.Version=test-v1.2.3 \
            -X main.Commit=${{ github.sha }} \
            -X main.Date=2025-01-01T00:00:00Z" \
            -o dist/spacectl.exe .

      - name: Mount cache directories
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:NSC_CACHE_PATH) {
            throw "NSC_CACHE_PATH is not set; expected the cache-backed runner to provide it"
          }
          Write-Host "NSC_CACHE_PATH=$env:NSC_CACHE_PATH"

          $target = Join-Path $env:RUNNER_TEMP 'spacectl-mount-test'
          if (Test-Path $target) { Remove-Item -Recurse -Force $target }

          # Destructive mount: create an NTFS junction at $target backed by the cache volume.
          & .\dist\spacectl.exe cache mount --dry_run=false --path="$target" -o json
          if ($LASTEXITCODE -ne 0) { throw "spacectl cache mount failed" }

          "MOUNT_TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify mount
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $target = $env:MOUNT_TARGET

          # The target must be a reparse point (junction), not a plain directory.
          $item = Get-Item -Force $target
          if (-not ($item.Attributes -band [IO.FileAttributes]::ReparsePoint)) {
            throw "expected $target to be a junction, got attributes: $($item.Attributes)"
          }
          Write-Host "Junction created: $target -> $($item.Target)"

          # Writing through the junction must land on the cache volume.
          'hello' | Out-File -FilePath (Join-Path $target 'sentinel.txt') -Encoding ascii
          $found = Get-ChildItem -Path $env:NSC_CACHE_PATH -Recurse -Filter sentinel.txt -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $found) {
            throw "sentinel.txt not found under NSC_CACHE_PATH; junction did not route writes to the cache volume"
          }
          Write-Host "Write routed to cache: $($found.FullName)"

          # Re-mounting the same path must now report a cache hit.
          $json = & .\dist\spacectl.exe cache mount --dry_run=false --path="$target" -o json | ConvertFrom-Json
          if (-not $json.output.mounts[0].cache_hit) {
            throw "expected cache_hit=true on re-mount"
          }
          Write-Host "Cache hit confirmed on re-mount"

  # Validate Xcode DerivedData hash
  xcode-hash:
    name: Xcode hash validation
    runs-on:
      - nscloud-macos-tahoe-arm64-12x28
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate Xcode DerivedData hash
        env:
          INTEGRATION_TEST_XCODE_HASH: "1"
        run: go test -run TestIntegration_XcodeDerivedDataHash ./internal/cache/mode/
